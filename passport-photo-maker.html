```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passport Photo Maker - Najmi Tools</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
padding:20px;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
margin:5px;
}

canvas{
max-width:100%;
border:1px solid #ddd;
margin-top:20px;
}

h1{
margin-bottom:20px;
}
</style>
</head>
<body>

<div class="container">

<h1>Passport Photo Maker</h1>

<input type="file" id="imageInput" accept="image/*">

<br><br>

<button onclick="createPassportPhoto()">
Create Passport Photo
</button>

<br>

<a id="downloadLink" style="display:none;">
<button>Download Photo</button>
</a>

<br>

<canvas id="canvas"></canvas>

<p id="status"></p>

</div>

<script>

let uploadedImage;

document.getElementById("imageInput")
.addEventListener("change",function(e){

const file=e.target.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(event){

uploadedImage=new Image();

uploadedImage.src=event.target.result;

};

reader.readAsDataURL(file);

});

function createPassportPhoto(){

if(!uploadedImage){
alert("Please upload image first");
return;
}

const canvas=document.getElementById("canvas");

const ctx=canvas.getContext("2d");

canvas.width=413;
canvas.height=531;

ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.drawImage(
uploadedImage,
0,
0,
canvas.width,
canvas.height
);

const dataUrl=
canvas.toDataURL("image/jpeg",0.95);

downloadLink.href=dataUrl;
downloadLink.download="passport-photo.jpg";
downloadLink.style.display="inline-block";

status.innerHTML=
"Passport Photo Ready";

}

</script>

</body>
</html>
```
